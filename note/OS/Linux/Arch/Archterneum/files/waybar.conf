// -*- mode: jsonc -*-
{
    "layer": "top",
    "position": "bottom",
    "height": 30,
    "spacing": 5,
    "modules-left": [
        "custom/rofi",
        "custom/pacman",
        // "sway/workspaces",
        // "sway/mode",
        // "sway/scratchpad",
        // "custom/media",
        "wlr/taskbar",
        ],
    "modules-center": [
        "hyprland/window",
    ],
    "modules-right": [
        //"mpd",
        "idle_inhibitor",
        "pulseaudio",
        //"wireplumber",
        "network",
        //"power-profiles-daemon",
        "cpu",
        "custom/cpulogo",
        "custom/tempcpu",
        "memory",
        "custom/gpuload",
        "custom/gpulogo",
        "custom/gputemperature",
        "custom/fan",
        //"backlight",
        "keyboard-state",
        //"sway/language",
        //"battery",
        //"battery#bat2",
        "clock",
        "tray",
        "custom/power"
    ],
    "sway/workspaces": {
        "disable-scroll": true,
        "all-outputs": true,
        "warp-on-scroll": false,
        "format": "{name}: {icon}",
        "format-icons": {
            "1": "яДа",
            "2": "яЙи",
            "3": "яДб",
            "4": "яЖ╝",
            "5": "яБ╡",
            "urgent": "яБк",
            "focused": "яЖТ",
            "default": "яДС"
        }
    },
    "custom/rofi": {
        "format": "ґ░гЗ",
        "on-click": "~/.config/rofi/start.sh",
        "tooltip": false,
    },
    "custom/pacman": {
        "format": "{text} ЁЯУжя╕П",
        "tooltip-format": "{text} ЁЯУжя╕П update",
        "interval": 900,
        "exec": "sudo rm /var/lib/pacman/db.lck ; sudo pacman -Sy &>/dev/null ; yay -Sy &>/dev/null ; echo $(($(pacman -Qu | wc -l) + $(yay -Qu | wc -l)))",
        "exec-if": "exit 0",
        "on-click": "xfce4-terminal --hide-menubar --hide-toolbar --hide-scrollbar --execute ~/.config/waybar/pacman_updater.sh",
        "signal": 8
    },
    "keyboard-state": {
        "numlock": true,
        "capslock": true,
        "format": "{name} {icon}",
        "format-icons": {
            "locked": "яАг",
            "unlocked": "яВЬ"
        }
    },
    "sway/mode": {
        "format": "<span style=\"italic\">{}</span>"
    },
    "sway/scratchpad": {
        "format": "{icon} {count}",
        "show-empty": false,
        "format-icons": ["", "яЛТ"],
        "tooltip": true,
        "tooltip-format": "{app}: {title}"
    },
    "hyprland/window": {
        "format": "{title}",
        "max-length": 24,
        "icon": true,
        "rewrite": {
            "(.*) тАУ Brave": "$1",
            "(.*) - Discord": "$1",
            "Terminal - (.*)": "$1",
        },
    },
    "wlr/taskbar": {
        "format": "{icon}",
        "tooltip-format": "{name} : {title}",
        "on-click": "activate",
        "on-click-middle": "close",
        "on-click-right": "hyprctl dispatch movetoworkspacesilent current,"
    },
    "mpd": {
        "format": "{stateIcon} {consumeIcon}{randomIcon}{repeatIcon}{singleIcon}{artist} - {album} - {title} ({elapsedTime:%M:%S}/{totalTime:%M:%S}) т╕и{songPosition}|{queueLength}т╕й {volume}% яАБ",
        "format-disconnected": "Disconnected яАБ",
        "format-stopped": "{consumeIcon}{randomIcon}{repeatIcon}{singleIcon}Stopped яАБ",
        "unknown-tag": "N/A",
        "interval": 5,
        "consume-icons": {
            "on": "яГД "
        },
        "random-icons": {
            "off": "<span color=\"#f53c3c\">яБ┤</span> ",
            "on": "яБ┤ "
        },
        "repeat-icons": {
            "on": "яАЮ "
        },
        "single-icons": {
            "on": "яАЮ1 "
        },
        "state-icons": {
            "paused": "яБМ",
            "playing": "яБЛ"
        },
        "tooltip-format": "MPD (connected)",
        "tooltip-format-disconnected": "MPD (disconnected)"
    },
    "idle_inhibitor": {
        "format": "{icon}",
        "tooltip": false,
        "format-icons": {
            "activated": "ЁЯТд тЭМ",
            "deactivated": "ЁЯТд тЬФя╕П"
        },
    },
    "tray": {
        "icon-size": 21,
        "spacing": 10,
        "icons": {
            "Steam": "~/.local/share/icons/hicolor/16x16/apps/steam_icon_70.png",
            "discord": "/opt/discord/discord.png",
            "vencord": "/opt/discord/discord.png",
        }
    },
    "clock": {
        "tooltip-format": "<big>{:%Y %B}</big>\n<tt><big>{calendar}</big></tt>",
        "format": "{:%d/%m %H:%M:%S}",
        "interval": 1
    },
    "cpu": {
        "format": "{usage:02}%",
        "interval": 1,
        "tooltip": false,
    },
    "custom/cpulogo": {
        "format": "ю░Щ"
    },
    "custom/tempcpu": {
        "exec": "~/gpu_scan.sh CPU temp",
        "exec-if": "exit 0",
        "format": "{text}┬░C",
        "interval": 1,
        "tooltip": false,
    },
    "memory": {
        "format": "{used:0.1f}G/{total:0.1f}G ю┐Е",
        "interval": 1,
        "tooltip": false,
    },
    "custom/gputemperature": {
        "exec": "~/gpu_scan.sh GPU temp",
        "exec-if": "exit 0",
        "format": "{text}┬░C",
        "interval": 1,
        "tooltip": false,
    },
    "custom/gpulogo": {
        "format": "ґ░во"
    },
    "custom/gpuload": {
        "exec": "~/gpu_scan.sh GPU load",
        "exec-if": "exit 0",
        "format": "{text}%",
        "interval": 1,
        "tooltip": false,
    },
    "custom/fan": {
        "format": "{text} ю╛з",
        "interval": 1,
        "tooltip": false,
        "exec": "~/gpu_scan.sh GPU fan",
        "exec-if": "exit 0",
    },
    "backlight": {
        // "device": "acpi_video1",
        "format": "{percent}% {icon}",
        "format-icons": ["юОН", "юПУ", "юПС", "юПП", "юПО", "юПН", "юПК", "юПИ", "юОЫ"]
    },
    "battery": {
        "states": {
            // "good": 95,
            "warning": 30,
            "critical": 15
        },
        "format": "{capacity}% {icon}",
        "format-full": "{capacity}% {icon}",
        "format-charging": "{capacity}% яЧз",
        "format-plugged": "{capacity}% яЗж",
        "format-alt": "{time} {icon}",
        // "format-good": "", // An empty format will hide the module
        // "format-full": "",
        "format-icons": ["яЙД", "яЙГ", "яЙВ", "яЙБ", "яЙА"]
    },
    "battery#bat2": {
        "bat": "BAT2"
    },
    "power-profiles-daemon": {
      "format": "{icon}",
      "tooltip-format": "Power profile: {profile}\nDriver: {driver}",
      "tooltip": true,
      "format-icons": {
        "default": "яГз",
        "performance": "яГз",
        "balanced": "яЙО",
        "power-saver": "яБм"
      }
    },
    "network": {
        // "interface": "wlp2*", // (Optional) To force the use of this interface
        "format-wifi": "{essid} ({signalStrength}%) яЗл",
        "format-ethernet": "{ipaddr}/{cidr} яЮЦ юлВ {bandwidthDownBytes:<} юлГ {bandwidthUpBytes:<}",
        "tooltip-format": "{ifname} via {gwaddr} яЮЦ",
        "format-linked": "{ifname} (No IP) яЮЦ",
        "format-disconnected": "Disconnected тЪа",
        "format-alt": "{ifname}: {ipaddr}/{cidr}",
        "interval": 1,
    },
    "pulseaudio": {
        "scroll-step": 5,
        "format": "{volume}% {icon}  {format_source}",
        "format-bluetooth": "{volume}% {icon}яКФ {format_source}",
        "format-bluetooth-muted": "яЪй {icon}яКФ {format_source}",
        "format-muted": "яЪй {format_source}",
        "format-source": "{volume}% яД░",
        "format-source-muted": "яД▒",
        "format-icons": {
            "headphone": "яАе",
            "hands-free": "яЦР",
            "headset": "яЦР",
            "phone": "яВХ",
            "portable": "яВХ",
            "car": "яЖ╣",
            "default": ["яАж", "яАз", "яАи"]
        },
        "on-click": "pavucontrol"
    },
    "wireplumber": {
        "format": "{icon} {volume}%",
        "format-muted": "яСж ",
        "on-click": "~/.config/hypr/scripts/Volume.sh --toggle",
        "on-click-right": "pavucontrol -t 3",
        "on-scroll-up": "~/.config/hypr/scripts/Volume.sh --inc",
        "on-scroll-down": "~/.config/hypr/scripts/Volume.sh --dec",
        "format-icons": ["яАж", "яАз", "ґ░Х╛", "яАи"], 
        "max-volume": 140,
    },
    "wireplumber#microphone": {
        "format": "яД░ {volume}%",
        "format-muted": "яД▒",
        "on-click": "~/.config/hypr/scripts/Volume.sh --toggle-mic",
        "on-click-right": "pavucontrol -t 4",
        "on-scroll-up": "~/.config/hypr/scripts/Volume.sh --mic-inc",
        "on-scroll-down": "~/.config/hypr/scripts/Volume.sh --mic-dec",
        "tooltip-format": "{source_desc} | {source_volume}%",
        "scroll-step": 5,
    },
    "custom/media": {
        "format": "{icon} {text}",
        "return-type": "json",
        "max-length": 40,
        "format-icons": {
            "spotify": "яЖ╝",
            "default": "ЁЯОЬ"
        },
        "escape": true,
        "exec": "$HOME/.config/waybar/mediaplayer.py 2> /dev/null" // Script in resources folder
        // "exec": "$HOME/.config/waybar/mediaplayer.py --player spotify 2> /dev/null" // Filter player based on name
    },
    "custom/power": {
        "format" : "тП╗",
		"tooltip": false,
		"menu": "on-click",
		"menu-file": "$HOME/.config/waybar/power_menu.xml", // Menu file in resources folder
		"menu-actions": {
			"shutdown": "shutdown",
			"reboot": "reboot",
			"suspend": "systemctl suspend",
			"hibernate": "systemctl hibernate"
		}
    }
}