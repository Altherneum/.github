        "idle_inhibitor",
        "custom/emote",
        "pulseaudio",
        //"wireplumber",
        "network",
        //"power-profiles-daemon",
        "cpu",
        "custom/cpulogo",
        "custom/tempcpu",
        "memory",
        "custom/gpuload",
        "custom/gpulogo",
        "custom/gputemperature",
