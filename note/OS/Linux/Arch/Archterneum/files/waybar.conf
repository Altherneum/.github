    "sway/workspaces": {
        "disable-scroll": true,
        "all-outputs": true,
        "warp-on-scroll": false,
        "format": "{name}: {icon}",
        "format-icons": {
            "1": "´äá",
            "2": "´ëĘ",
            "3": "´äí",
            "4": "´ć╝",
            "5": "´üÁ",
            "urgent": "´ü¬",
            "focused": "´ćĺ",
            "default": "´äĹ"
        }
    },
    "custom/rofi": {
        "format": "ˇ░úç",
        "on-click": "~/.config/rofi/start.sh",
        "tooltip": false,
    },
    "custom/pacman": {
        "format": "{text} ­čôŽ´ŞĆ",
        "tooltip-format": "{text} ­čôŽ´ŞĆ update",
        "interval": 900,
        "exec": "sudo rm /var/lib/pacman/db.lck ; sudo pacman -Sy &>/dev/null ; yay -Sy &>/dev/null ; echo $(($(pacman -Qu | wc -l) + $(yay -Qu | wc -l)))",
        "exec-if": "exit 0",
        "on-click": "xfce4-terminal --hide-menubar --hide-toolbar --hide-scrollbar --execute ~/.config/waybar/pacman_updater.sh",
        "signal": 8
    },
    "keyboard-state": {
        "numlock": true,
        "capslock": true,
        "format": "{name} {icon}",
        "format-icons": {
            "locked": "´Çú",
            "unlocked": "´éť"
        }
    },
    "sway/mode": {
        "format": "<span style=\"italic\">{}</span>"
    },
    "sway/scratchpad": {
        "format": "{icon} {count}",
        "show-empty": false,
        "format-icons": ["", "´őĺ"],
        "tooltip": true,
        "tooltip-format": "{app}: {title}"
    },
    "hyprland/window": {
        "format": "{title}",
        "max-length": 24,
        "icon": true,
        "rewrite": {
            "(.*) ÔÇô Brave": "$1",
            "(.*) - Discord": "$1",
            "Terminal - (.*)": "$1",
        },
    },
    "wlr/taskbar": {
        "format": "{icon}",
        "tooltip-format": "{name} : {title}",
        "on-click": "activate",
        "on-click-middle": "close",
        "on-click-right": "hyprctl dispatch movetoworkspacesilent current,"
    },
    "mpd": {
        "format": "{stateIcon} {consumeIcon}{randomIcon}{repeatIcon}{singleIcon}{artist} - {album} - {title} ({elapsedTime:%M:%S}/{totalTime:%M:%S}) ÔŞĘ{songPosition}|{queueLength}ÔŞę {volume}% ´Çü",
        "format-disconnected": "Disconnected ´Çü",
        "format-stopped": "{consumeIcon}{randomIcon}{repeatIcon}{singleIcon}Stopped ´Çü",
        "unknown-tag": "N/A",
        "interval": 5,
        "consume-icons": {
            "on": "´âä "
        },
        "random-icons": {
            "off": "<span color=\"#f53c3c\">´ü┤</span> ",
            "on": "´ü┤ "
        },
        "repeat-icons": {
            "on": "´Ç× "
        },
        "single-icons": {
            "on": "´Ç×1 "
        },
        "state-icons": {
            "paused": "´üî",
            "playing": "´üő"
        },
        "tooltip-format": "MPD (connected)",
