    "clock": {
        "tooltip-format": "<big>{:%Y %B}</big>\n<tt><big>{calendar}</big></tt>",
        "format": "{:%d/%m %H:%M:%S}",
        "interval": 1
    },
    "cpu": {
        "format": "{usage:02}%",
        "interval": 1,
        "tooltip": false,
    },
    "custom/cpulogo": {
        "format": "ţ░Ö"
    },
    "custom/tempcpu": {
        "exec": "~/gpu_scan.sh CPU temp",
        "exec-if": "exit 0",
        "format": "{text}┬░C",
        "interval": 1,
        "tooltip": false,
    },
    "memory": {
        "format": "{used:0.1f}G/{total:0.1f}G ţ┐ů",
        "interval": 1,
        "tooltip": false,
    },
    "custom/gputemperature": {
        "exec": "~/gpu_scan.sh GPU temp",
        "exec-if": "exit 0",
        "format": "{text}┬░C",
        "interval": 1,
        "tooltip": false,
    },
    "custom/gpulogo": {
        "format": "ˇ░ó«"
    },
    "custom/gpuload": {
        "exec": "~/gpu_scan.sh GPU load",
        "exec-if": "exit 0",
        "format": "{text}%",
        "interval": 1,
        "tooltip": false,
    },
    "custom/fan": {
        "format": "{text} ţżž",
        "interval": 1,
        "tooltip": false,
        "exec": "~/gpu_scan.sh GPU fan",
        "exec-if": "exit 0",
    },
    "backlight": {
        // "device": "acpi_video1",
        "format": "{percent}% {icon}",
        "format-icons": ["ţÄŹ", "ţĆô", "ţĆĹ", "ţĆĆ", "ţĆÄ", "ţĆŹ", "ţĆŐ", "ţĆł", "ţÄŤ"]
    },
    "battery": {
        "states": {
            // "good": 95,
            "warning": 30,
            "critical": 15
        },
        "format": "{capacity}% {icon}",
        "format-full": "{capacity}% {icon}",
        "format-charging": "{capacity}% ´Śž",
        "format-plugged": "{capacity}% ´çŽ",
        "format-alt": "{time} {icon}",
        // "format-good": "", // An empty format will hide the module
        // "format-full": "",
        "format-icons": ["´ëä", "´ëâ", "´ëé", "´ëü", "´ëÇ"]
    },
    "battery#bat2": {
        "bat": "BAT2"
    },
    "power-profiles-daemon": {
